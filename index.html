<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>먹는 가계부</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<div class="app">

  <header class="top-header">
    <div>
      <div class="page-title">먹는 가계부</div>
      <div class="user-email" id="userStatus">로그인하지 않음</div>
    </div>

    <div class="header-actions">
      <button class="icon-btn" id="themeBtn">☀️</button>
      <button class="logout-btn" id="loginBtn">구글 로그인</button>
    </div>
  </header>

  <section id="screen-food" class="screen active">
    <div class="hero-card">
      <div class="hero-label">오늘 결과</div>
      <div class="hero-value" id="todayBalance">0 kcal</div>
      <div class="hero-sub" id="todaySummary">섭취 0 · 운동 0 · 기준 0</div>
    </div>

    <div class="page-subtitle">먹은 거</div>
    <div id="foodList" class="card"></div>
  </section>

  <section id="screen-exercise" class="screen">
    <div class="page-subtitle">운동</div>
    <div id="exerciseList" class="card"></div>
  </section>

  <section id="screen-month" class="screen">
    <div class="month-bar">
      <button class="circle-btn" id="prevMonthBtn">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="circle-btn" id="nextMonthBtn">›</button>
    </div>

    <div class="card
