<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>먹는 가계부</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<div class="app">

  <header class="top-header">
    <div>
      <div class="page-title">먹는 가계부</div>
      <div class="user-email">먹은 칼로리 · 운동 · 월별 변화 기록</div>
    </div>

    <div class="header-actions">
      <button class="icon-btn" onclick="toggleTheme()">☀️</button>
      <button class="logout-btn" onclick="resetAll()">초기화</button>
    </div>
  </header>

  <section class="card">
    <div class="card-title">내 정보</div>

    <div class="form-grid">
      <input id="height" class="soft-input" type="number" placeholder="키 cm">
      <input id="weight" class="soft-input" type="number" placeholder="몸무게 kg">
      <input id="age" class="soft-input" type="number" placeholder="나이">
      <select id="gender" class="soft-input">
        <option value="male">남성</option>
        <option value="female">여성</option>
      </select>
    </div>

    <button class="entry-save" onclick="saveProfile()">기초대사량 계산</button>

    <div class="summary-grid">
      <div class="summary-box">
        <span>기초대사량</span>
        <strong id="bmrText">-</strong>
      </div>
      <div class="summary-box">
        <span>오늘 섭취</span>
        <strong id="todayFood">0</strong>
      </div>
      <div class="summary-box">
        <span>오늘 결과</span>
        <strong id="todayBalance">0</strong>
      </div>
    </div>
  </section>

  <main>

    <section id="screen-food" class="screen active">
      <div class="page-subtitle">오늘 먹은 거</div>
      <div id="foodList" class="card"></div>

      <div class="card">
        <div class="card-title">기본 음식표</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>음식</th>
                <th>kcal</th>
                <th>탄</th>
                <th>단</th>
                <th>지</th>
              </tr>
            </thead>
            <tbody id="foodPresetTable"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="screen-exercise" class="screen">
      <div class="page-subtitle">오늘 운동</div>
      <div id="exerciseList" class="card"></div>

      <div class="card">
        <div class="card-title">기본 운동표</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>운동</th>
                <th>시간</th>
                <th>소비 kcal</th>
              </tr>
            </thead>
            <tbody id="exercisePresetTable"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="screen-month" class="screen">
      <div class="month-bar">
        <button class="circle-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="circle-btn" onclick="changeMonth(1)">›</button>
      </div>

      <div class="card">
        <div id="calendarGrid"></div>
      </div>

      <div class="card">
        <div class="card-title">선택한 날짜 상세</div>
        <div id="dayDetail" class="empty">날짜를 누르면 상세 기록이 나옵니다.</div>
      </div>
    </section>

    <section id="screen-stat" class="screen">
      <div class="card">
        <div class="card-title">이번 달 통계</div>
        <div id="statResult"></div>
      </div>
    </section>

  </main>
</div>

<button id="fab" class="fab" onclick="openEntry()">+</button>

<nav class="bottom-nav">
  <button class="tab-btn active" onclick="showScreen('food')">
    <span>🍚</span><em>먹은 거</em>
  </button>
  <button class="tab-btn" onclick="showScreen('exercise')">
    <span>🏃</span><em>운동</em>
  </button>
  <button class="tab-btn" onclick="showScreen('month')">
    <span>📅</span><em>월별</em>
  </button>
  <button class="tab-btn" onclick="showScreen('stat')">
    <span>📊</span><em>통계</em>
  </button>
</nav>

<div id="entryOverlay" class="entry-overlay hidden" onclick="closeEntry()"></div>

<section id="entrySheet" class="entry-sheet hidden">
  <div class="sheet-handle"></div>

  <div class="entry-head">
    <h3 id="entryTitle">기록 추가</h3>
    <button class="entry-close" onclick="closeEntry()">×</button>
  </div>

  <label class="field-label" id="mealLabel">구분</label>
  <div id="mealGrid" class="category-grid"></div>

  <label class="field-label">이름</label>
  <input id="entryName" class="soft-input" placeholder="예: 바나나">

  <label class="field-label" id="timeLabel">운동 시간</label>
  <input id="entryTime" class="soft-input" type="number" placeholder="분">

  <label class="field-label">칼로리</label>
  <div class="amount-wrap">
    <input id="entryKcal" class="amount-input" type="number" placeholder="0">
    <span>kcal</span>
  </div>

  <button class="entry-save" onclick="saveEntry()">저장</button>
  <button class="entry-cancel" onclick="closeEntry()">취소</button>
</section>

<script src="app.js"></script>
</body>
</html>
